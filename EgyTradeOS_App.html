*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#c9a84c;--gold2:#f5d06e;--green:#22c55e;--blue:#3b82f6;
  --purple:#a855f7;--red:#ef4444;--pink:#ec4899;--cyan:#06b6d4;--amber:#f59e0b;
  --bg:#020810;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);

}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
nav{
  background:rgba(2,8,16,.98);border-bottom:1px solid rgba(201,168,76,.15);
  padding:0 14px;display:flex;align-items:center;gap:8;height:52px;flex-shrink:0;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:8;cursor:pointer;text-decoration:none}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#c9a84c,#8b6914);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#020810;font-size:15px}
.logo-text{font-size:12px;font-weight:900;color:var(--gold);line-height:1}
.logo-sub{font-size:7px;color:var(--muted);line-height:1}

/* DISPATCH BANNER */
#dispatch{
  background:rgba(201,168,76,.06);border-bottom:1px solid rgba(201,168,76,.15);
  padding:7px 14px;display:flex;align-items:center;gap:10;flex-shrink:0;overflow:hidden;
}
.dispatch-label{font-size:9px;font-weight:700;color:var(--amber);white-space:nowrap;display:flex;align-items:center;gap:5}
.dispatch-scroll{display:flex;gap:14;overflow-x:auto;flex:1;scrollbar-width:none}
.dispatch-scroll::-webkit-scrollbar{display:none}
.dispatch-item{font-size:10px;white-space:nowrap}
.dispatch-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0;padding:0 4px}

/* TABS */
.tabs{
  display:flex;overflow-x:auto;border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;scrollbar-width:none;padding:0 8px;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  border:none;background:transparent;color:var(--muted);
  font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;
  padding:10px 12px;white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .2s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 16px 80px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* CARDS */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:16px;transition:all .25s;margin-bottom:12px;
}
.card-hover{cursor:pointer}
.card-hover:active{transform:scale(.98);border-color:rgba(201,168,76,.3)}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'Cairo',sans-serif;border-radius:10px;transition:all .2s;font-weight:700;padding:11px 20px;font-size:13px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#020810}
.btn-gold:active{transform:scale(.97)}
.btn-outline{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.btn-outline:active{background:rgba(201,168,76,.22)}
.btn-pink{background:linear-gradient(135deg,#ec4899,#f472b6);color:#020810}
.btn-sm{padding:7px 14px;font-size:11px;border-radius:8px}

/* INPUTS */
.inp{
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;

.inp:focus{outline:none;border-color:var(--gold)}
.inp::placeholder{color:#475569}
textarea.inp{resize:none;line-height:1.7}
select.inp{cursor:pointer;appearance:none}

/* GRADIENT TEXT */
.g{background:linear-gradient(135deg,#c9a84c,#f5d06e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.1);

.stat-val{font-size:24px;font-weight:900;font-family:'Cairo',sans-serif}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:2px}

.module-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.module-desc{font-size:10px;color:var(--muted);line-height:1.5}

.chip{display:inline-block;border:1px solid rgba(201,168,76,.25);background:rgba(201,168,76,.08);

.ai-box{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px}
.ai-header{display:flex;align-items:center;gap:8;margin-bottom:12px}

/* AGREEMENT CARD */
.ag-card{border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid}
.ag-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ag-pill{font-size:10px;padding:3px 10px;border-radius:100px;font-weight:700}

/* PULSE */

h2{font-size:16px;font-weight:900}
p{font-size:12px;color:var(--muted);line-height:1.8}
</style>

const ENC={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;'};
function sanitize(s,max=2000){if(!s)return'';let c=String(s);XSS.forEach(p=>{c=c.replace(p,'')});c=c.replace(/[&<>"']/g,ch=>ENC[ch]||ch);return c.trim().slice(0,max)}
function validateNum(v,min=0,max=1e9){const n=parseFloat(v);return isFinite(n)&&n>=min&&n<=max?n:null}

const _rl=new Map();
function rateLimit(k,max,win){const now=Date.now();const ts=(_rl.get(k)||[]).filter(t=>t>now-win);_rl.set(k,ts);if(ts.length>=max)return{ok:false,retry:Math.ceil((ts[0]+win-now)/1000)};ts.push(now);return{ok:true}}

function findAGR(country){
  if(!country)return null;
  const c=country.toLowerCase();
  for(const[k,ag]of Object.entries(AGR)){
    const list=isAR()?ag.c_ar:ag.c_en;
    if(list.some(x=>x.toLowerCase().includes(c)||c.includes(x.toLowerCase())))return{k,...ag};
  }
  return null;
}

function calcDuty(ch,cif,country){
  const h=HS[ch];if(!h||!cif)return null;
  const ag=findAGR(country);
  const rate=ag?h.d*(1-ag.disc/100):h.d;
  const duty=cif*rate/100;
  const vat=(cif+duty)*h.v/100;
  const goeic=h.g?cif*.01:0;
  const port=cif*.005;
  const save=cif*(h.d/100)-duty;
  return{name:isAR()?h.ar:h.en,cif,duty,vat,goeic,port,total:cif+duty+vat+goeic+port,rate,origRate:h.d,ag,save:save>0?save:0,vet:h.vet,hal:h.hal,phy:h.phy,g:h.g};

function matchKB(q){
  const l=q.toLowerCase();
  if(l.match(/ملابس|garment|clothing|نسيج|textile/))return'garment';
  if(l.match(/فراولة|strawberry/))return'strawberry';
  if(l.match(/رخام|marble|جرانيت|granite/))return'marble';
  if(l.match(/برتقال|orange|حمضيات|citrus/))return'orange';
  if(l.match(/gafta|جافتا|عرب/))return'gafta';
  return null;
}

function defaultResp(q){

    :`🤖 **EgyAI analyzing: "${s}"**\n\nAvailable agreements:\n• GAFTA → Zero with 17 Arab countries\n• COMESA → 80% reduction with Africa\n• EU → Up to zero duties\n• QIZ → Zero to USA (textiles)\n\nCore documents:\nInvoice + Packing List + CO + B/L + Insurance\n\n💡 Specify product + country for precise answer\n\n📌 Source: customs.gov.eg + goeic.gov.eg`;
}

async function askEgyAI(query){
  const q=sanitize(query,400);
  const rl=rateLimit('ai',10,60000);
  if(!rl.ok)throw new Error('RL:'+rl.retry);

  try{
    const ctrl=new AbortController();
    const to=setTimeout(()=>ctrl.abort(),8000);
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:700,
        messages:[{role:'user',content:`أنت EgyAI خبير تجارة خارجية مصري. أجب ${isAR()?'بالعربية':'in English'} بشكل منظم. السؤال: ${q}. قدم: رسوم جمارك، اتفاقيات، مستندات. أضف "📌 المصدر: [مصادر رسمية] — ثقة [%]" في النهاية. لا تذكر أسماء AI خارجية.`}]
      })
    });
    clearTimeout(to);
    if(res.ok){const d=await res.json();const t=d?.content?.[0]?.text;if(t)return{answer:t.slice(0,2500),live:true}}
  }catch{}

  await new Promise(r=>setTimeout(r,600));
  const key=matchKB(q);
  return{answer:key?KB[key][isAR()?'ar':'en']:defaultResp(q),live:false};
}

function setAgentTask(t){STATE.agentTask=t;renderContent()}

async function runAgent(){
  const task=document.getElementById('agent-task')?.value||STATE.agentTask;
  const safe=sanitize(task,300);
  if(!safe||safe.length<5)return;
  const rl=rateLimit('agent',3,60000);
  if(!rl.ok)return;
  STATE.agentTask=safe;STATE.agentRunning=true;STATE.agentLog=[];renderContent();
  const steps=isAR()?[
    `🔍 تحليل المهمة: "${safe.slice(0,40)}..."`,
    '🗄️ البحث في قواعد البيانات الرسمية...',
    '⚖️ حساب الرسوم الجمركية والاتفاقيات...',
    '📋 إعداد قائمة المستندات...',
    '🌍 البحث عن مستوردين محتملين...',
    '💰 حساب دعم الصادرات...',
    '📊 إعداد التقرير النهائي...',
    '✅ اكتملت المهمة بنجاح',
  ]:[
    `🔍 Analyzing: "${safe.slice(0,40)}..."`,
    '🗄️ Searching official databases...',
    '⚖️ Calculating duties & agreements...',
    '📋 Preparing documents checklist...',
    '🌍 Finding potential buyers...',
    '💰 Calculating export support...',
    '📊 Preparing final report...',
    '✅ Task completed successfully',
  ];
  for(const step of steps){
    await new Promise(r=>setTimeout(r,600+Math.random()*400));
    STATE.agentLog.push(step);renderContent();
  }
  STATE.agentRunning=false;renderContent();
}

    </div>

    <div style="display:flex;flex-wrap:wrap;margin-bottom:14px">
      ${(isAR()?['ملابس للسعودية','فراولة لأوروبا','رخام لإيطاليا','برتقال لروسيا','GAFTA','COMESA']:['Garments Saudi','Strawberry EU','Marble Italy','Orange Russia','GAFTA','COMESA']).map(q=>`<span class="chip" onclick="setQuery('${q}')">${q}</span>`).join('')}
    </div>

    <div class="ai-box" style="margin-bottom:14px">
      <textarea id="ai-query" class="inp" rows="2" placeholder="${isAR()?'اسأل عن أي منتج، دولة، أو إجراء جمركي...':'Ask about any product, country, or customs procedure...'}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitAI()}">${sanitize(STATE.query)}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        ${STATE.aiError?`<span style="font-size:11px;color:#ef4444">⚠️ ${STATE.aiError}</span>`:`<span style="font-size:10px;color:var(--dark)">Enter ${isAR()?'للإرسال':'to send'}</span>`}
        <button class="btn btn-gold" onclick="submitAI()" ${STATE.aiLoading?'disabled':''} style="padding:9px 20px">
          ${STATE.aiLoading?`<span class="spinner" style="border-color:#020810;border-top-color:transparent"></span> ${isAR()?'يحلل...':'Analyzing...'}`:`🚀 ${isAR()?'اسأل EgyAI':'Ask EgyAI'}`}
        </button>
      </div>
    </div>

    ${STATE.aiAnswer?`
    <div class="ai-box">
      <div class="ai-header">
        <div class="ai-icon">⚡</div>
        <span style="font-size:12px;color:var(--gold);font-weight:700">EgyAI</span>
      </div>
      <div class="ai-resp">${sanitize(STATE.aiAnswer)}</div>
      ${STATE.transparency?`
      <div class="transparency">
        <div style="font-weight:700;margin-bottom:3px">🔍 Transparency Layer</div>
        <div>📌 ${isAR()?'مصدر:':'Source:'} ${sanitize(STATE.transparency.src)}</div>
        <div>🕐 ${sanitize(STATE.transparency.time)}</div>
      </div>`:''}
    </div>`:''}`;
}

function setQuery(q){STATE.query=q;renderContent();setTimeout(()=>{const ta=document.getElementById('ai-query');if(ta)ta.value=q},50)}

async function submitAI(){
  const q=sanitize(document.getElementById('ai-query')?.value||STATE.query,400);
  if(!q||q.length<3)return;
  STATE.query=q;STATE.aiLoading=true;STATE.aiAnswer='';STATE.aiError=null;STATE.transparency=null;renderContent();
  try{
    const r=await askEgyAI(q);
    STATE.aiAnswer=r.answer;
    STATE.transparency={src:r.live?'EgyAI Live Engine':'EgyAI Offline — GOEIC + customs.gov.eg',time:new Date().toLocaleTimeString()};
  }catch(err){
    STATE.aiError=err.message?.startsWith('RL:')?`${isAR()?'انتظر':'Wait'} ${err.message.split(':')[1]}${isAR()?'ث':'s'}`:(isAR()?'خطأ مؤقت':'Temp error');
  }
  STATE.aiLoading=false;renderContent();
}
